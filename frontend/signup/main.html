<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script type="text/javascript" src="accounted.js"></script>
    <script type="text/javascript" src="main.js" defer></script>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="wrapper">
        <h1>Signup</h1>
        <form id="form">
            <div class="input-wrapper">
                <label for="username">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Z"/></svg>
                </label>
                <input type="text" id="username" placeholder="Username" class="input-box">
            </div>
            <div class="error-space">
                <p id="error 1" class="error"></p>
                <p id="error 0" class="error"></p>
            </div>
            <div class="input-wrapper">
                <label for="email">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M479-46q-90 0-168.5-34T173-173q-59-59-93-138T46-480q0-90 34-169t93-138q59-59 138-93t169-34q90 0 169 34t138 93q59 59 93 137.5T914-481v58q0 66-48.5 112T749-265q-38 0-72-16t-55-48q-25 33-62.5 48.5T480-265q-90 0-152.5-62.5T265-480q0-90 62.5-152.5T480-695q90 0 152.5 62.5T695-480v49q0 23 16 39.5t39 16.5q23 0 38-16.5t15-39.5v-50q0-134-94.5-228T480-803q-134 0-228.5 94.5T157-480q0 134 94 228.5T479-157h201v111H479Zm75.5-359.5Q585-436 585-480t-30.5-74.5Q524-585 480-585t-74.5 30.5Q375-524 375-480t30.5 74.5Q436-375 480-375t74.5-30.5Z"/></svg>
                </label>
                <input type="email" id="email" placeholder="Email" class="input-box">
            </div>
            <div class="error-space">
                <p id="error 3" class="error"></p>
            </div>
            <div class="input-wrapper">
                <label for="password">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#1f1f1f"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm296.5-223.5Q560-327 560-360t-23.5-56.5Q513-440 480-440t-56.5 23.5Q400-393 400-360t23.5 56.5Q447-280 480-280t56.5-23.5ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/></svg>
                </label>
                <input type="password" id="password" placeholder="Password" class="input-box">
            </div>
            <div class="error-space">
                <p id="error 2" class="error"></p>
            </div>
            <div>
                <button type="button" class="signup" onclick="signup()">Signup</button>
            </div>
            <p class="login">Already have an account? <a id="link" href="../signin">Login</a></p>
            <p class="login">Or do you want to go back to <a id="link" href="../main.html">main?</a></p>
        </form>
    </div>
</body>
</html>
